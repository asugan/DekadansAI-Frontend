services:
  dekadansai-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: dekadansai-frontend:latest
    container_name: dekadansai-frontend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://host.docker.internal:4000}
    ports:
      - "3000:3000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
